<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoWatch</title>

<style>
:root{
  --green:#1b5e3b;
  --bg:#eef2ef;
  --white:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
}

/* APP WRAPPER */
.app{
  display:flex;
  width:100%;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--green);
  color:white;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.sidebar button{
  background:none;
  border:none;
  color:white;
  padding:10px;
  text-align:left;
  cursor:pointer;
  border-radius:6px;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.2);
}

/* MAIN AREA */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

/* APP CONTAINER (THIS RESIZES AUTOMATICALLY) */
.app-window{
  width:420px;
  height:92vh;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
}

/* SCREENS */
.screen{
  display:none;
  flex:1;
  overflow-y:auto;
}

.screen.active{
  display:block;
}

/* HEADER */
.header{
  background:var(--green);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:var(--green);
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* ================= RESPONSIVE ================= */

/* TABLET */
@media(max-width:900px){
  .app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    flex-direction:row;
    overflow-x:auto;
  }

  .main{
    align-items:stretch;
  }

  .app-window{
    width:100%;
    height:100vh;
    border-radius:0;
  }
}

/* PHONE */
@media(max-width:600px){
  .sidebar{
    display:none;
  }

  .main{
    padding:0;
  }

  .app-window{
    width:100%;
    height:100vh;
    border-radius:0;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>🌿 EcoWatch</h3>
    <button onclick="show('home')">Home</button>
    <button onclick="show('reports')">Reports</button>
    <button onclick="show('form')">New Report</button>
    <button onclick="show('notifications')">Notifications</button>
    <button onclick="show('profile')">Profile</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="app-window">

      <!-- HOME -->
      <div class="screen active" id="home">
        <div class="header">
          <div>Home</div>
          <button onclick="show('profile')">👤</button>
        </div>
        <div style="padding:15px">
          <h3>Welcome to EcoWatch</h3>
        </div>
      </div>

      <!-- REPORTS -->
      <div class="screen" id="reports">
        <div class="header"><div>Reports</div></div>
        <div style="padding:15px">No reports yet</div>
      </div>

      <!-- FORM -->
      <div class="screen" id="form">
        <div class="header"><div>New Report</div></div>

        <div style="padding:15px">
          <input placeholder="Location">
          <input placeholder="Description">

          <button class="btn" onclick="submitReport()">Submit</button>
        </div>
      </div>

      <!-- NOTIFICATIONS -->
      <div class="screen" id="notifications">
        <div class="header"><div>Notifications</div></div>
        <div style="padding:15px">
          <p>No new notifications</p>
        </div>
      </div>

      <!-- PROFILE -->
      <div class="screen" id="profile">
        <div class="header"><div>Profile</div></div>
        <div style="padding:15px">
          <h3>User Profile</h3>
        </div>
      </div>

    </div>

  </div>

</div>

<script>
function show(id){
  document.querySelectorAll('.screen')
    .forEach(s=>s.classList.remove('active'));

  document.getElementById(id).classList.add('active');
}

function submitReport(){
  alert("Report submitted!");
  show('reports');
}
</script>

</body>
</html>
