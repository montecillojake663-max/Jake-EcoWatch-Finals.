<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoWatch</title>

<style>
:root{
  --green:#1b5e3b;
  --bg:#f0f7f0;
  --white:#fff;
  --text:#111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
}

/* APP LAYOUT */
.app-container{
  display:flex;
  height:100vh;
  width:100%;
  overflow:hidden;
}

/* SIDEBAR (DESKTOP) */
.sidebar{
  width:260px;
  background:var(--green);
  color:white;
  display:flex;
  flex-direction:column;
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.menu-item{
  background:none;
  border:none;
  color:white;
  padding:12px;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
}

.menu-item:hover,
.menu-item.active{
  background:rgba(255,255,255,0.15);
}

/* MAIN CONTENT */
.main-content{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* SCREENS */
.screen{
  display:none;
}

.screen.active{
  display:block;
}

/* SIMPLE UI */
.header{
  background:var(--green);
  color:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:var(--green);
  color:white;
  cursor:pointer;
  border-radius:8px;
}

/* RESPONSIVE (TABLET + MOBILE) */
@media(max-width:900px){
  .app-container{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    flex-direction:row;
    overflow-x:auto;
  }

  .menu-item{
    white-space:nowrap;
  }
}

@media(max-width:600px){
  .sidebar{
    display:none;
  }

  .main-content{
    padding:0;
  }
}
</style>

</head>

<body>

<div class="app-container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🌿 EcoWatch</h2>

    <button class="menu-item active" onclick="showScreen('home')">Home</button>
    <button class="menu-item" onclick="showScreen('reports')">Reports</button>
    <button class="menu-item" onclick="showScreen('form')">New Report</button>
    <button class="menu-item" onclick="showScreen('notifications')">Notifications</button>
    <button class="menu-item" onclick="showScreen('profile')">Profile</button>
  </div>

  <!-- MAIN -->
  <div class="main-content">

    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div class="header">Home</div>
      <p>Welcome to EcoWatch</p>
    </div>

    <!-- REPORTS -->
    <div class="screen" id="screen-reports">
      <div class="header">Reports</div>
      <p>No reports yet</p>
    </div>

    <!-- FORM -->
    <div class="screen" id="screen-form">
      <div class="header">New Report</div>

      <input placeholder="Location" style="width:100%;padding:10px;margin-top:10px;">
      <input placeholder="Description" style="width:100%;padding:10px;margin-top:10px;">

      <button class="btn" onclick="submitReport()">Submit</button>
    </div>

    <!-- NOTIFICATIONS -->
    <div class="screen" id="screen-notifications">
      <div class="header">Notifications</div>
      <p>No notifications</p>
    </div>

    <!-- PROFILE -->
    <div class="screen" id="screen-profile">
      <div class="header">Profile</div>
      <p>User Profile</p>
    </div>

  </div>

</div>

<script>
function showScreen(name){

  document.querySelectorAll('.screen')
    .forEach(s => s.classList.remove('active'));

  document.getElementById('screen-' + name)
    .classList.add('active');

  document.querySelectorAll('.menu-item')
    .forEach(b => b.classList.remove('active'));
}

function submitReport(){
  alert("Report submitted!");
  showScreen('reports');
}
</script>

</body>
</html>
