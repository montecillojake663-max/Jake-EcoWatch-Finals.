<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoWatch</title>

<style>
:root{
  --green-dark:#1b5e3b;
  --green-mid:#2e7d52;
  --green-light:#e8f5e9;
  --text:#111;
  --white:#fff;
  --border:#e5e5e5;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:#f5f7f6;
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--green-dark);
  color:#fff;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar button{
  background:none;
  border:none;
  color:#fff;
  padding:12px;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
}

.sidebar button:hover,
.sidebar button.active{
  background:rgba(255,255,255,0.2);
}

/* APP WRAPPER */
.app{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

/* PHONE / MAIN PANEL */
.phone{
  width:420px;
  height:90vh;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  resize:horizontal;
}

/* SCREENS */
.screen{
  display:none;
  flex:1;
  padding:20px;
  overflow:auto;
}

.screen.active{
  display:block;
}

/* HEADER */
.header{
  background:var(--green-dark);
  color:white;
  padding:15px;
  font-weight:bold;
}

/* BUTTON */
.btn{
  padding:10px;
  margin-top:10px;
  border:none;
  background:var(--green-mid);
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* RESPONSIVE (LIKE GITHUB STYLE) */
@media(max-width:900px){
  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    flex-direction:row;
    overflow-x:auto;
  }

  .sidebar button{
    flex:1;
    text-align:center;
  }

  .phone{
    width:100%;
    height:100vh;
    border-radius:0;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <button class="active" onclick="show('home')">Home</button>
  <button onclick="show('reports')">Reports</button>
  <button onclick="show('form')">New Report</button>
  <button onclick="show('profile')">Profile</button>
</div>

<!-- APP -->
<div class="app">
  <div class="phone">

    <!-- HOME -->
    <div id="home" class="screen active">
      <div class="header">Home</div>
      <p>Welcome to EcoWatch</p>
      <button class="btn" onclick="show('reports')">Go Reports</button>
    </div>

    <!-- REPORTS -->
    <div id="reports" class="screen">
      <div class="header">Reports</div>
      <p>List of reports here...</p>
      <button class="btn" onclick="show('form')">Create Report</button>
    </div>

    <!-- FORM -->
    <div id="form" class="screen">
      <div class="header">New Report</div>
      <input placeholder="Location" style="width:100%;padding:10px;margin-top:10px;">
      <textarea placeholder="Description" style="width:100%;padding:10px;margin-top:10px;"></textarea>
      <button class="btn" onclick="alert('Submitted!')">Submit</button>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="screen">
      <div class="header">Profile</div>
      <p>User Profile Page</p>
    </div>

  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
}
</script>

</body>
</html>
